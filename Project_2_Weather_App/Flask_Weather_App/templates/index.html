<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="weather-card">
            <h1 class="title">Weather Finder</h1>
            
            <div class="search-container">
                <form id="weatherForm">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="cityInput" 
                            placeholder="Enter city name..." 
                            required
                        >
                        <button type="submit" class="search-btn">Search</button>
                    </div>
                </form>
            </div>
            
            <div id="loadingSpinner" class="spinner hidden"></div>
            
            <div id="errorContainer" class="error-container hidden">
                <p id="errorMessage" class="error-message"></p>
            </div>
            
            <div id="weatherContainer" class="weather-container hidden">
                <div class="weather-header">
                    <div class="location">
                        <h2 id="cityName"></h2>
                        <p id="countryCode"></p>
                    </div>
                    <div id="weatherEmoji" class="weather-emoji"></div>
                </div>
                
                <div class="temperature-section">
                    <div class="main-temp">
                        <span id="temperature" class="temperature"></span>
                        <span class="unit">°C</span>
                    </div>
                    <p id="weatherDescription" class="description"></p>
                </div>
                
                <div class="details-grid">
                    <div class="detail-item">
                        <span class="detail-label">💧 Humidity</span>
                        <span id="humidity" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">💨 Wind Speed</span>
                        <span id="windSpeed" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">�️ Visibility</span>
                        <span id="visibility" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">☀️ UV Index</span>
                        <span id="uvIndex" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">📍 Coordinates</span>
                        <span id="coordinates" class="detail-value"></span>
                    </div>
                </div>
                
                <!-- Sunrise/Sunset for Today -->
                <div class="sun-info">
                    <div class="sun-item">
                        <span class="sun-label">🌅 Sunrise</span>
                        <span id="sunrise" class="sun-value"></span>
                    </div>
                    <div class="sun-item">
                        <span class="sun-label">🌇 Sunset</span>
                        <span id="sunset" class="sun-value"></span>
                    </div>
                </div>
                
                <!-- Hourly Forecast -->
                <div class="forecast-section">
                    <h3 class="forecast-title">⏰ Hourly Forecast (Next 24 Hours)</h3>
                    <div id="hourlyContainer" class="hourly-container"></div>
                </div>
                
                <!-- 7-Day Forecast -->
                <div class="forecast-section">
                    <h3 class="forecast-title">📅 7-Day Forecast</h3>
                    <div id="dailyContainer" class="daily-container"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
